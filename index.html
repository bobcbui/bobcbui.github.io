<!DOCTYPE html>
<html lang="zh-CN" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>堂堂程序员</title>
	<meta name="Description" Content="堂堂程序员是国内最不知名的一个个人博客网站，内容最不丰富的网站，只包括，Java,Python，前端，数据库,游戏，漫画，社会，经济，兼容。">
    <meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <meta name="viewport" content="width=device-width,initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <style type="text/css">
        body,html,#app{
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }
		::-webkit-scrollbar {
			width: 15px;
			height: 15px;
		}
		::-webkit-scrollbar-track,
		::-webkit-scrollbar-thumb {
			border-radius: 999px;
			border: 5px solid transparent;
		}
 
		::-webkit-scrollbar-track {
			box-shadow: 1px 1px 5px rgba(0,0,0,.2) inset;
		}
		::-webkit-scrollbar-thumb {
			min-height: 20px;
			background-clip: content-box;
			box-shadow: 0 0 0 5px rgba(0, 0, 0, 0.2) inset;
		}
		::-webkit-scrollbar-corner {
			background: transparent;
		}
		.collect-item {
            padding-bottom: 20px;
        }
        .long-title {
			font-size: 15px;
        }
		.markdown-body {
			width: 100%;
			padding: 0px;
    	}
		html{
			overflow-y:scroll
		}
	</style>
</head>
<body>
    <div id="app" v-cloak>
		<el-row>
			<el-col :span="2" :xs="1">
				&nbsp;
			</el-col>
			<el-col :span="20" :xs="22">
				<el-tabs v-model="activeName" @tab-click="handleClick">
					<el-tab-pane label="堂堂程序员" name="home"></el-tab-pane>
					<el-tab-pane label="分类" name="class" @click="qh(blog.blogClass)">
						<el-tag v-for="(item,index) in blog.blogClass" :key="index" v-text="item + '(' + index + ')'" style="margin: 0 3px 6px 3px;" @click="onTag(item)"></el-tag>
					</el-tab-pane>
					<el-tab-pane label="标签"  name="tag" v-on:click="qh(blog.blogTags)">
						<el-tag v-for="(item,index) in blog.blogTags" :key="index" v-text="item + '(' + index + ')'" style="margin: 0 3px 6px 3px;" @click="onTag(item)"></el-tag>
					</el-tab-pane>
					<el-tab-pane v-for="(item,index) in thisTag" :key="index" :name="item" :label="item">
						<el-row :gutter="20">
							<el-col :sm="24" :md="12" :lg="12" v-for="(item,index) in thisBlogs" :key="index">
								<div style="background-color: antiquewhite;padding: 5px;border-radius: 3px; margin-bottom: 15px;">
									<h3 style="margin: 0px;"><a :href="item.blog.url" v-text="item.blog.title"></a></h3>
									<span v-text="item.blogClass"></span>.<span v-for="(item,index) in item.blogTag" v-text="item" :key="index"></span>
								</div>
							</el-col>
						</el-row>
					</el-tab-pane>
				</el-tabs>
			</el-col>
			<el-col :span="2" :xs="1">
				&nbsp;
			</el-col>
		</el-row>
	</div>
</body>
<script src="https://unpkg.com/vue/dist/vue.js"></script>
<script src="https://unpkg.com/element-ui/lib/index.js"></script>
<script src="https://unpkg.com/jquery@3.4.0/dist/jquery.min.js"></script>
<script>	
	let v = new Vue({
        el: '#app',
        data() {
            return {
				activeName:"first",
				blog:{
					blogs:[
						{
							blog:{
								url:"blog/1",
								date:"2020.10.10",
								title:"这是一篇博客",
								describe:"急啊卡省的JFK大家看法角度看看到JFK的降幅扩大解放卡洛斯酒店房卡大家是否啊可是大家饭卡上的飞机"
							},
							blogClass:"日志",
							blogTag:["java","python","人生"]
						},{
							blog:{
								url:"blog/2",
								date:"2020.10.11",
								title:"这是一篇博d第三方客",
								describe:"急啊卡省的啊啊JFK大阿斯顿发放家看法角度看看到JFK的降幅扩大解放卡洛斯酒店房卡大家是否啊可是大家饭卡上的飞机"
							},
							blogClass:"日志1",
							blogTag:["java1","python1","人生1"]
						}
					],
					blogTags:["java","python","人生","java1","python1","人生1"],
					blogClass:["日志","日志1"]
				},
				thisTag:[],
				thisBlogs:[]
            }
        }
		,
		mounted(){
			this.thisTag = this.blog.blogClass
		},
        methods: {
			onTag(tag){
				this.activeName = tag	
			},
			handleClick(tab, event) {
				if(tab.name == "tag"){
					this.thisTag = this.blog.blogTags
				}else if(tab.name == "class"){
					this.thisTag = this.blog.blogClass
				}else{
					this.thisBlogs = this.blog.blogs
				}
			}
        }
	
		
		// date .getYear() date .getMonth() date .getDate()
	})
	var d = new Date()
	s = d.getYear() + "" + d.getDate() + "" + d.getMonth();

	
	$.ajax({
		type: "get",
		url: "https://www.jnnvc.com/data.json?s="+s,
		async: true,
		dataType: "json",
		success: function (result) {
			v.gyHtml = marked(result);
		}
	});
</script>

</html>
